<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Structure Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0D0D1A; }
    #root { min-height: 100vh; }
    /* Hide Babel warnings */
    .babel-error { display: none !important; }
  </style>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel standalone for JSX transform -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Load the component via Babel JSX transform -->
  <script type="text/babel" data-type="module">
    // Provide React hooks as globals so the component's named imports work
    const { useState, useMemo, useRef, useCallback, useEffect, Fragment } = React;

    function showError(message) {
      document.getElementById('root').innerHTML = `
        <div style="padding:40px;color:#ff6b6b;font-family:monospace;">
          <h2>Load Error</h2>
          <pre>${message}</pre>
        </div>`;
    }

    // Load all project data. Tries /api/structures (MCP mode) first;
    // falls back to manifest+JSON (local mode) if unavailable.
    // cache: 'no-store' ensures re-fetches bypass the browser cache.
    async function loadProjects() {
      // --- MCP path ---
      try {
        const structResp = await fetch('/api/structures', { cache: 'no-store' });
        if (structResp.ok) {
          const data = await structResp.json();
          window.__projectsMode = data.mode || 'mcp';
          const projects = data.projects || {};
          await _attachFutureWork(projects);
          return projects;
        }
      } catch (_) {
        // fetch error (e.g. server not running /api/structures) → fall through
      }

      // --- Local fallback path ---
      window.__projectsMode = 'local';
      const manifestResp = await fetch('./projects/manifest.json', { cache: 'no-store' });
      if (!manifestResp.ok) {
        throw new Error(`Failed to load manifest: ${manifestResp.status} ${manifestResp.statusText}`);
      }
      const manifest = await manifestResp.json();

      const projects = {};
      for (const entry of manifest.projects) {
        try {
          const resp = await fetch(`./projects/${entry.file}`, { cache: 'no-store' });
          if (!resp.ok) {
            console.warn(`Skipping ${entry.key}: fetch failed (${resp.status})`);
            continue;
          }
          const data = await resp.json();
          // Each file is keyed by project key: { "key": { ...model... } }
          Object.assign(projects, data);
          // Merge manifest metadata so the UI can identify tracked projects
          if (projects[entry.key]) {
            if (entry.sourcePath) projects[entry.key].sourcePath = entry.sourcePath;
            if (entry.starred != null) projects[entry.key].starred = entry.starred;
            if (entry.hidden != null) projects[entry.key].hidden = entry.hidden;
          }
        } catch (err) {
          console.warn(`Skipping ${entry.key}: ${err.message}`);
        }
      }
      // Local mode — no future work
      for (const key of Object.keys(projects)) {
        projects[key].futureWork = null;
      }
      return projects;
    }

    /**
     * Conditionally fetch future work data for each project (MCP mode only).
     * Sets project.futureWork to the result object or null.
     */
    async function _attachFutureWork(projects) {
      // Check if future work collector is enabled
      let enabled = false;
      try {
        const statusResp = await fetch('/api/status', { cache: 'no-store' });
        if (statusResp.ok) {
          const statusData = await statusResp.json();
          enabled = !!statusData.futureWorkEnabled;
        }
      } catch (_) { /* ignore */ }

      for (const key of Object.keys(projects)) {
        if (!enabled) {
          projects[key].futureWork = null;
          continue;
        }
        try {
          const resp = await fetch(`/api/future-work?project=${encodeURIComponent(key)}`, { cache: 'no-store' });
          if (resp.ok) {
            const result = await resp.json();
            projects[key].futureWork = result.data || null;
          } else {
            projects[key].futureWork = null;
          }
        } catch (_) {
          projects[key].futureWork = null;
        }
      }
    }

    // Expose loadProjects so the mounted component can call it for refresh
    window.__loadProjects = loadProjects;

    async function boot() {
      try {
        // Load project data before mounting the component
        const PROJECTS = await loadProjects();
        window.__PROJECTS = PROJECTS;

        const resp = await fetch(`./project-structure-viz.jsx?v=${Date.now()}`);
        if (!resp.ok) throw new Error(`Failed to load JSX: ${resp.status}`);
        let src = await resp.text();

        // Strip the ESM import line — we already have React globals
        src = src.replace(/^import\s+\{[^}]+\}\s+from\s+["']react["'];?\s*$/m, '');

        // Replace `export default` with a global assignment
        src = src.replace(/export\s+default\s+function\s+(\w+)/, 'window.$COMPONENT = function $1');
        // Handle arrow-function default exports too
        src = src.replace(/export\s+default\s+/, 'window.$COMPONENT = ');

        // Transform JSX → JS via Babel
        const transformed = Babel.transform(src, {
          presets: ['react'],
          filename: 'project-structure-viz.jsx',
        }).code;

        // Execute — PROJECTS is read from window.__PROJECTS inside the component
        const fn = new Function('React', 'useState', 'useMemo', 'useRef', 'useCallback', 'useEffect', 'Fragment', transformed);
        fn(React, useState, useMemo, useRef, useCallback, useEffect, Fragment);

        // Render
        const App = window.$COMPONENT;
        if (!App) throw new Error('Component not found after eval');

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
      } catch (err) {
        showError(`${err.message}\n\n${err.stack || ''}`);
        console.error(err);
      }
    }

    boot();
  </script>
</body>
</html>
