<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Structure Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0D0D1A; }
    #root { min-height: 100vh; }
    /* Hide Babel warnings */
    .babel-error { display: none !important; }
  </style>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel standalone for JSX transform -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Load the component via Babel JSX transform -->
  <script type="text/babel" data-type="module">
    // Provide React hooks as globals so the component's named imports work
    const { useState, useMemo, useRef, useCallback, useEffect } = React;

    function showError(message) {
      document.getElementById('root').innerHTML = `
        <div style="padding:40px;color:#ff6b6b;font-family:monospace;">
          <h2>Load Error</h2>
          <pre>${message}</pre>
        </div>`;
    }

    // Load all project data from external JSON files via manifest
    async function loadProjects() {
      const manifestResp = await fetch('./projects/manifest.json');
      if (!manifestResp.ok) {
        throw new Error(`Failed to load manifest: ${manifestResp.status} ${manifestResp.statusText}`);
      }
      const manifest = await manifestResp.json();

      const projects = {};
      for (const entry of manifest.projects) {
        try {
          const resp = await fetch(`./projects/${entry.file}`);
          if (!resp.ok) {
            console.warn(`Skipping ${entry.key}: fetch failed (${resp.status})`);
            continue;
          }
          const data = await resp.json();
          // Each file is keyed by project key: { "key": { ...model... } }
          Object.assign(projects, data);
        } catch (err) {
          console.warn(`Skipping ${entry.key}: ${err.message}`);
        }
      }
      return projects;
    }

    // Expose loadProjects so the mounted component can call it for refresh
    window.__loadProjects = loadProjects;

    async function boot() {
      try {
        // Load project data before mounting the component
        const PROJECTS = await loadProjects();
        window.__PROJECTS = PROJECTS;

        const resp = await fetch('./project-structure-viz.jsx');
        if (!resp.ok) throw new Error(`Failed to load JSX: ${resp.status}`);
        let src = await resp.text();

        // Strip the ESM import line — we already have React globals
        src = src.replace(/^import\s+\{[^}]+\}\s+from\s+["']react["'];?\s*$/m, '');

        // Replace `export default` with a global assignment
        src = src.replace(/export\s+default\s+function\s+(\w+)/, 'window.$COMPONENT = function $1');
        // Handle arrow-function default exports too
        src = src.replace(/export\s+default\s+/, 'window.$COMPONENT = ');

        // Transform JSX → JS via Babel
        const transformed = Babel.transform(src, {
          presets: ['react'],
          filename: 'project-structure-viz.jsx',
        }).code;

        // Execute — PROJECTS is read from window.__PROJECTS inside the component
        const fn = new Function('React', 'useState', 'useMemo', 'useRef', 'useCallback', 'useEffect', transformed);
        fn(React, useState, useMemo, useRef, useCallback, useEffect);

        // Render
        const App = window.$COMPONENT;
        if (!App) throw new Error('Component not found after eval');

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
      } catch (err) {
        showError(`${err.message}\n\n${err.stack || ''}`);
        console.error(err);
      }
    }

    boot();
  </script>
</body>
</html>
